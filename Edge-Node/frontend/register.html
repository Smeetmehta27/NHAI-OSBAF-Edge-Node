<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | NHAI OSBAF</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
    <style>
        .camera-section { margin: 20px auto; width: 100%; max-width: 500px; border: 2px solid #38bdf8; border-radius: 10px; overflow: hidden; background: #000; position: relative;}
        video { width: 100%; display: block; transform: scaleX(-1); }
        .hud { position: absolute; top: 10px; left: 10px; color: #0284c7; font-weight: bold; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px;}
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; color: #cbd5e1; font-weight: bold; }
        .form-group input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; }
        #statusMessage { margin: 15px; font-size: 18px; font-weight: bold; color: #facc15; }
    </style>
</head>
<body>
    <div class="header">
        <div>NHAI OSBAF Edge Node</div>
        <a href="/">← Dashboard</a>
    </div>
    <div class="container" style="text-align: center;">
        <h1>Enroll Personnel</h1>
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div class="form-group">
                <label>Employee ID:</label>
                <input type="text" id="userId" placeholder="e.g. EMP-101">
            </div>
            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" id="name" placeholder="e.g. Rahul Sharma">
            </div>
            <div class="camera-section">
                <div class="hud">Datalake Enrollment</div>
                <video id="video" autoplay playsinline muted></video>
                <canvas id="canvas" style="display:none;"></canvas>
            </div>
            <div id="statusMessage">Requesting Camera Access...</div>
            <button id="captureBtn" class="btn" style="width: 100%; font-size: 18px;" disabled>Capture & Register</button>
        </div>
    </div>
    <script src="/frontend/js/register.js?v=2"></script>
</body>
</html>
